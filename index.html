<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Asset Viewer - CP3 Majalengka</title>

<style>
*{box-sizing:border-box;margin:0;padding:0}
body{
font-family:'Segoe UI',Roboto,Helvetica,Arial,sans-serif;
min-height:100vh;display:flex;flex-direction:column;
justify-content:center;align-items:center;
background:#fff;padding:20px;overflow-x:hidden
}
#particleCanvas{
position:fixed;top:0;left:0;width:100vw;height:100vh;
z-index:0;pointer-events:none
}
.wrapper{
width:80%;max-width:600px;display:flex;
flex-direction:column;align-items:center;z-index:10
}
.bg-logo-left,.bg-logo-right{
position:fixed;top:25px;max-height:90px;z-index:5;
opacity:.9
}
.bg-logo-left{left:25px}
.bg-logo-right{right:25px}
.site-header{
font-size:20px;font-weight:800;color:#111;
letter-spacing:4px;margin-bottom:25px;text-transform:uppercase;
opacity:0;animation:fadeIn .8s forwards .2s
}
@keyframes fadeIn{to{opacity:1}}
.card{
background:rgba(255,255,255,.95);width:100%;
border-radius:16px;box-shadow:0 15px 30px rgba(0,0,0,.1);
padding:30px 25px;backdrop-filter:blur(5px);
animation:slideUp .6s forwards;transition:.4s
}
.card:hover{transform:translateY(-5px)}
@keyframes slideUp{
from{opacity:0;transform:translateY(20px)}
to{opacity:1;transform:translateY(0)}
}
.card::before{
content:'';position:absolute;top:0;left:0;width:100%;height:5px;
background:linear-gradient(90deg,#ff4da6,#4dd2ff)
}
.title{
font-size:20px;font-weight:800;margin-bottom:20px;text-align:center
}
.data-item{
background:#fcfcfc;padding:12px 15px;border-radius:10px;
margin-bottom:14px;border-left:3px solid #4dd2ff
}
.data-item:nth-child(even){border-left-color:#ff4da6}
.label{font-size:11px;color:#888;text-transform:uppercase}
.value{font-weight:700;font-size:15px}
.id-badge{
margin-top:25px;font-size:12px;color:#777;text-align:center;
background:#f9f9f9;padding:8px;border-radius:6px;
font-family:monospace;border:1px dashed #ddd
}
.error-title{color:#d9534f;text-align:center;font-weight:bold}
.error-msg{text-align:center;color:#666;margin:10px 0}
.footer-credit{
margin-top:25px;font-size:10px;color:#999;
letter-spacing:2px;opacity:.2
}
.skeleton{
height:18px;background:linear-gradient(90deg,#f0f0f0 25%,#e0e0e0 50%,#f0f0f0 75%);
background-size:200% 100%;animation:shimmer 1.5s infinite;
border-radius:6px;margin-bottom:15px
}
.skeleton-title{height:28px;width:70%;margin:0 auto 25px}
.skeleton-box{height:55px;border-radius:10px}
@keyframes shimmer{
0%{background-position:200% 0}
100%{background-position:-200% 0}
}
</style>
</head>

<body>

<canvas id="particleCanvas"></canvas>

<img class="bg-logo-left" src="https://raw.githubusercontent.com/itdtwest/PPA/refs/heads/main/Mie-Gacoan.webp">
<img class="bg-logo-right" src="https://raw.githubusercontent.com/itdtwest/PPA/refs/heads/main/ppa.png">

<div class="wrapper">
<div class="site-header">CP3 MAJALENGKA</div>

<div class="card" id="appContainer">
<div class="skeleton skeleton-title"></div>
<div class="skeleton skeleton-box"></div>
<div class="skeleton skeleton-box"></div>
<div class="skeleton skeleton-box"></div>
</div>

<div class="footer-credit">IRGA CP3 x Renagge</div>
</div>

<script>
const API_URL="https://script.google.com/macros/s/AKfycbxyvPHQy5618KxkX4H_nIuYG3NKWwexPPRxgi7lX02p36CaHOFKs_zTRlo3zP1hVp_a7w/exec";
const idScan=new URLSearchParams(window.location.search).get("id"), app=document.getElementById("appContainer");
if(!idScan){
  app.innerHTML=`<div class="error-title">INVALID PARAMETER</div><div class="error-msg">URL harus ada ?id=</div>`;
}else{
  fetch(API_URL+"?id="+encodeURIComponent(idScan)).then(r=>r.json()).then(res=>{
    if(!res||res.status==="error"){
      app.innerHTML=`<div class="error-title">Aset Tidak Ditemukan</div><div class="id-badge">${idScan}</div>`;
      return;
    }
    const d=res.data, src=res.source==="cache"?"⚡ Cached":"☁️ Realtime";
    app.innerHTML=`<div class="title">${d.namaAsset||d.deskripsi||'-'}</div>
      <div class="data-item"><div class="label">No / ID</div><div class="value">${d.no||'-'}</div></div>
      <div class="data-item"><div class="label">Dekripsi</div><div class="value">${d.deskripsi||'-'}</div></div>
      <div class="data-item"><div class="label">Lokasi</div><div class="value">${d.lokasi||'-'}</div></div>
      <div class="data-item"><div class="label">Qty</div><div class="value">${d.qty||'-'}</div></div>
      <div style="display:flex;justify-content:space-between;align-items:center;margin-top:20px;">
        
        <div style="font-size:10px;color:#aaa;font-weight:bold;text-transform:uppercase;background:#eee;padding:4px 8px;border-radius:4px">${src}</div>
      </div>`;
  }).catch((err)=>{
    app.innerHTML=`<div class="error-title">Koneksi Gagal</div>
    <div class="error-msg" style="font-size:10px">${err.message || 'Cek koneksi internet atau izin Deployment (Set ke "Anyone")'}</div>`;
    console.error(err);
  });
}

const c=document.getElementById('particleCanvas');
const x=c.getContext('2d');
let w=c.width=innerWidth,h=c.height=innerHeight;
addEventListener('resize',()=>{w=c.width=innerWidth;h=c.height=innerHeight});

const colors=['#ff4da6','#4dd2ff'];
let p=[];
class C{
constructor(){this.r()}
r(){
this.x=Math.random()*w;
this.y=Math.random()*h;
this.s=Math.random()*8+3;
this.v=Math.random()*1.5+.5;
this.a=Math.random()*6.28;
this.sp=(Math.random()-.5)*.1;
this.sw=Math.random()*6.28;
this.c=colors[Math.floor(Math.random()*2)];
}
u(){
this.y+=this.v;
this.x+=Math.sin(this.sw)*.8;
this.a+=this.sp;
if(this.y>h)this.r();
}
d(){
x.save();
x.translate(this.x,this.y);
x.rotate(this.a);
x.fillStyle=this.c;
x.fillRect(-this.s/2,-this.s/2,this.s,this.s);
x.restore();
}
}
for(let i=0;i<60;i++)p.push(new C());
(function a(){
x.clearRect(0,0,w,h);
p.forEach(e=>{e.u();e.d()});
requestAnimationFrame(a);
})();
</script>

</body>
</html>
